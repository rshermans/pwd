
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.header{padding:1.25rem 0 0.75rem;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.25rem}
.header h1{font-size:18px;font-weight:500}
.header p{font-size:13px;color:var(--color-text-secondary);margin-top:4px}
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:0}
.tab{font-size:13px;padding:6px 14px;border:none;background:none;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px;font-family:var(--font-sans)}
.tab.active{color:var(--color-text-primary);border-bottom:2px solid var(--color-text-primary);font-weight:500}
.tab:hover{color:var(--color-text-primary)}
.section{display:none}
.section.active{display:block}
.phase-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-text-tertiary);margin:1.25rem 0 0.5rem}
.week-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:0.75rem;overflow:hidden}
.week-header{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;cursor:pointer;user-select:none}
.week-header:hover{background:var(--color-background-secondary)}
.week-title{font-size:14px;font-weight:500}
.week-date{font-size:12px;color:var(--color-text-secondary)}
.week-progress{display:flex;align-items:center;gap:8px}
.progress-bar{width:80px;height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width 0.3s}
.progress-pct{font-size:11px;color:var(--color-text-secondary);min-width:28px;text-align:right}
.chevron{font-size:12px;color:var(--color-text-tertiary);transition:transform 0.2s}
.chevron.open{transform:rotate(180deg)}
.tasks{padding:0 1rem 0.75rem;display:none}
.tasks.open{display:block}
.task{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.task:last-child{border-bottom:none}
.task input[type=checkbox]{margin-top:3px;accent-color:#1D9E75;width:15px;height:15px;flex-shrink:0;cursor:pointer}
.task label{font-size:13px;color:var(--color-text-primary);cursor:pointer;line-height:1.5}
.task.done label{color:var(--color-text-tertiary);text-decoration:line-through}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:1.25rem}
.kpi-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.875rem 1rem}
.kpi-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.kpi-vals{display:flex;align-items:baseline;gap:6px}
.kpi-current{font-size:22px;font-weight:500}
.kpi-target{font-size:13px;color:var(--color-text-tertiary)}
.kpi-bar{height:3px;background:var(--color-background-primary);border-radius:2px;margin-top:8px;overflow:hidden}
.kpi-bar-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width 0.3s}
.kpi-bar-fill.warn{background:#EF9F27}
.kpi-input-row{display:flex;align-items:center;gap:8px;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary)}
.kpi-input-row select,.kpi-input-row input[type=number]{font-size:13px;font-family:var(--font-sans)}
.kpi-input-row select{flex:2}
.kpi-input-row input[type=number]{flex:1;min-width:60px}
.kpi-input-row button{flex-shrink:0;font-size:13px;font-family:var(--font-sans)}
.log-area{margin-bottom:0.75rem}
.log-row{display:flex;gap:8px;margin-bottom:0.5rem}
.log-row input,.log-row textarea{font-size:13px;font-family:var(--font-sans)}
.log-row input{flex:1}
.log-row textarea{flex:3;min-height:38px;resize:vertical}
.log-row button{flex-shrink:0;font-size:13px;font-family:var(--font-sans)}
.evidence-list{margin-top:0.5rem}
.evidence-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.evidence-item:last-child{border-bottom:none}
.evidence-date{color:var(--color-text-tertiary);white-space:nowrap;flex-shrink:0;font-size:11px;margin-top:2px}
.evidence-text{flex:1;line-height:1.5}
.evidence-del{background:none;border:none;color:var(--color-text-tertiary);cursor:pointer;font-size:14px;padding:0 2px;font-family:var(--font-sans)}
.evidence-del:hover{color:var(--color-text-danger,#E24B4A)}
.export-btn{margin-top:1rem;font-size:13px;font-family:var(--font-sans)}
.overall-bar{margin-bottom:1.5rem;padding:1rem;background:var(--color-background-secondary);border-radius:var(--border-radius-lg)}
.overall-bar .label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px}
.overall-bar .label span:first-child{font-weight:500}
.overall-bar .label span:last-child{color:var(--color-text-secondary)}
.big-bar{height:8px;background:var(--color-background-primary);border-radius:4px;overflow:hidden}
.big-bar-fill{height:100%;background:#1D9E75;border-radius:4px;transition:width 0.4s}
</style>

<h2 class="sr-only">Painel de acompanhamento do Roadmap blockchain.pt — 8 semanas</h2>

<div class="header">
  <h1>Roadmap blockchain.pt</h1>
  <p>Maio – Junho 2026 · Técnico de Informação | Comunidade & Conteúdo</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('tarefas')">Tarefas</button>
  <button class="tab" onclick="showTab('kpis')">KPIs</button>
  <button class="tab" onclick="showTab('evidencias')">Evidências</button>
</div>

<div id="sec-tarefas" class="section active"></div>
<div id="sec-kpis" class="section">
  <div class="kpi-grid" id="kpi-grid"></div>
  <div class="kpi-input-row">
    <select id="kpi-sel"></select>
    <input type="number" id="kpi-val" placeholder="Valor atual" min="0">
    <button onclick="updateKPI()">Atualizar</button>
  </div>
</div>
<div id="sec-evidencias" class="section">
  <div class="log-area">
    <div class="log-row">
      <input type="text" id="ev-date" placeholder="Data (ex: 02/05)" style="max-width:110px">
      <textarea id="ev-text" placeholder="Descreve o que foi feito, resultado, link, etc."></textarea>
      <button onclick="addEvidence()">Adicionar</button>
    </div>
  </div>
  <div class="evidence-list" id="evidence-list"></div>
  <button class="export-btn" onclick="exportReport()">Exportar relatório ↗</button>
</div>

<script>
const WEEKS = [
  {id:'w1',phase:'Fase 1 — Fundação',title:'Semana 1',date:'a partir de 28 de abril',tasks:[
    'Criar conta Instagram: bio, foto de perfil, link WhatsApp, post de apresentação',
    'Criar grupo WhatsApp: nome, regras, mensagem de boas-vindas',
    'Definir identidade visual: paleta, tipografia, template de posts (Canva)',
    'Auditoria ao website e LinkedIn existentes',
    'Contactar os primeiros 3 candidatos a entrevista/speaker'
  ]},
  {id:'w2',phase:null,title:'Semana 2',date:'a partir de 5 de maio',tasks:[
    'Publicar os primeiros 3 posts no Instagram',
    'Gravar a primeira entrevista',
    'Configurar plataforma de podcast (Anchor/Buzzsprout)',
    'Recrutar os primeiros 10–15 membros para o WhatsApp via rede pessoal',
    'Confirmar pelo menos 1 speaker para o webinar'
  ]},
  {id:'w3',phase:'Fase 2 — Crescimento',title:'Semana 3',date:'a partir de 12 de maio',tasks:[
    '3 posts Instagram com tema: identidade digital com blockchain',
    'Gravar a segunda entrevista',
    'Publicar 1 artigo no LinkedIn sobre a Portuguese Digital Wallet',
    'Primeiro desafio/pergunta na comunidade WhatsApp'
  ]},
  {id:'w4',phase:null,title:'Semana 4',date:'a partir de 19 de maio',tasks:[
    'Publicar episódio 1 do podcast',
    'Anunciar o webinar no Instagram e no WhatsApp',
    'Abrir página de registo do webinar no website',
    'Gravar a terceira entrevista',
    'Confirmar os 3 speakers do webinar'
  ]},
  {id:'w5',phase:null,title:'Semana 5',date:'a partir de 26 de maio',tasks:[
    '3 posts de contagem decrescente para o webinar',
    'Publicar clips teaser com os speakers (30–60 segundos)',
    'Enviar convite formal a professores e associações de TI',
    'Gravar a quarta entrevista'
  ]},
  {id:'w6',phase:'Fase 3 — Evento',title:'Semana 6',date:'a partir de 2 de junho',tasks:[
    'Ensaio técnico com os 3 speakers',
    'Publicar episódio 2 do podcast',
    'Publicar programa completo do webinar',
    'Push final de registos: Instagram + WhatsApp + LinkedIn'
  ]},
  {id:'w7',phase:null,title:'Semana 7 — Semana do Webinar',date:'a partir de 9 de junho',tasks:[
    'Realizar o webinar (sugestão: quarta-feira, 11 de junho)',
    'Cobertura ao vivo no Instagram Stories',
    'Gravação publicada no YouTube e/ou LinkedIn até 48h depois',
    'Clips dos melhores momentos publicados nas redes',
    'Follow-up para a comunidade WhatsApp: agradecimentos + próximos passos'
  ]},
  {id:'w8',phase:'Fase 4 — Consolidação',title:'Semana 8',date:'a partir de 16 de junho',tasks:[
    'Publicar destaques e agradecimentos do webinar',
    'Gravar e publicar a quinta entrevista (se aplicável)',
    'Redigir relatório de resultados com KPIs vs objetivos alcançados',
    'Preparar proposta de continuidade para os próximos 3 meses'
  ]}
];

const KPIS = [
  {id:'ig_seg',label:'Instagram — seguidores',target:200,unit:''},
  {id:'ig_posts',label:'Instagram — posts publicados',target:20,unit:''},
  {id:'ig_eng',label:'Instagram — engagement rate',target:5,unit:'%'},
  {id:'wa_mem',label:'WhatsApp — membros ativos',target:50,unit:''},
  {id:'wa_int',label:'WhatsApp — interações/semana',target:3,unit:''},
  {id:'pod_ep',label:'Podcast — episódios publicados',target:2,unit:''},
  {id:'ent',label:'Entrevistas gravadas e publicadas',target:5,unit:''},
  {id:'web_reg',label:'Webinar — registos',target:50,unit:''},
  {id:'web_live',label:'Webinar — participantes ao vivo',target:30,unit:''},
  {id:'web_sp',label:'Webinar — speakers confirmados',target:3,unit:''},
  {id:'li_art',label:'LinkedIn — artigos publicados',target:3,unit:''},
  {id:'web_lp',label:'Website — landing page webinar',target:1,unit:''}
];

let state = {tasks:{},kpis:{},evidence:[]};

async function load(){
  try{
    const r=await window.storage.get('bpt_state');
    if(r&&r.value) state=JSON.parse(r.value);
  }catch(e){}
  render();
}

async function save(){
  try{await window.storage.set('bpt_state',JSON.stringify(state));}catch(e){}
}

function render(){
  renderTasks();
  renderKPIs();
  renderEvidence();
}

function renderTasks(){
  const el=document.getElementById('sec-tarefas');
  const totalTasks=WEEKS.reduce((a,w)=>a+w.tasks.length,0);
  const doneTasks=WEEKS.reduce((a,w)=>a+w.tasks.filter((_,i)=>state.tasks[w.id+'_'+i]).length,0);
  const pct=totalTasks>0?Math.round(doneTasks/totalTasks*100):0;
  let html=`<div class="overall-bar"><div class="label"><span>Progresso geral</span><span>${doneTasks} de ${totalTasks} tarefas concluídas</span></div><div class="big-bar"><div class="big-bar-fill" style="width:${pct}%"></div></div></div>`;
  let lastPhase='';
  WEEKS.forEach(w=>{
    if(w.phase&&w.phase!==lastPhase){
      html+=`<div class="phase-label">${w.phase}</div>`;
      lastPhase=w.phase;
    }
    const done=w.tasks.filter((_,i)=>state.tasks[w.id+'_'+i]).length;
    const wpct=w.tasks.length>0?Math.round(done/w.tasks.length*100):0;
    const openClass=state['open_'+w.id]?'open':'';
    html+=`<div class="week-card">
      <div class="week-header" onclick="toggleWeek('${w.id}')">
        <div><div class="week-title">${w.title}</div><div class="week-date">${w.date}</div></div>
        <div class="week-progress">
          <div class="progress-bar"><div class="progress-fill" style="width:${wpct}%"></div></div>
          <span class="progress-pct">${wpct}%</span>
          <span class="chevron ${openClass}">▼</span>
        </div>
      </div>
      <div class="tasks ${openClass}" id="tasks-${w.id}">`;
    w.tasks.forEach((t,i)=>{
      const key=w.id+'_'+i;
      const ck=state.tasks[key]?'checked':'';
      html+=`<div class="task ${ck?'done':''}">
        <input type="checkbox" id="${key}" ${ck} onchange="toggleTask('${key}')">
        <label for="${key}">${t}</label>
      </div>`;
    });
    html+=`</div></div>`;
  });
  el.innerHTML=html;
}

function toggleWeek(id){
  state['open_'+id]=!state['open_'+id];
  save();
  renderTasks();
}

function toggleTask(key){
  state.tasks[key]=!state.tasks[key];
  save();
  renderTasks();
}

function renderKPIs(){
  const grid=document.getElementById('kpi-grid');
  const sel=document.getElementById('kpi-sel');
  grid.innerHTML='';
  sel.innerHTML='';
  KPIS.forEach(k=>{
    const cur=state.kpis[k.id]||0;
    const pct=Math.min(100,Math.round(cur/k.target*100));
    const warn=pct<50;
    grid.innerHTML+=`<div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-vals"><span class="kpi-current">${cur}${k.unit}</span><span class="kpi-target">/ ${k.target}${k.unit}</span></div>
      <div class="kpi-bar"><div class="kpi-bar-fill${warn?' warn':''}" style="width:${pct}%"></div></div>
    </div>`;
    sel.innerHTML+=`<option value="${k.id}">${k.label}</option>`;
  });
}

function updateKPI(){
  const k=document.getElementById('kpi-sel').value;
  const v=parseFloat(document.getElementById('kpi-val').value);
  if(isNaN(v)) return;
  state.kpis[k]=v;
  document.getElementById('kpi-val').value='';
  save();
  renderKPIs();
}

function renderEvidence(){
  const el=document.getElementById('evidence-list');
  if(!state.evidence||state.evidence.length===0){el.innerHTML='<p style="font-size:13px;color:var(--color-text-tertiary);padding:0.5rem 0">Ainda sem entradas. Adiciona a primeira evidência acima.</p>';return;}
  el.innerHTML=state.evidence.map((e,i)=>`<div class="evidence-item">
    <span class="evidence-date">${e.date}</span>
    <span class="evidence-text">${e.text}</span>
    <button class="evidence-del" onclick="delEvidence(${i})" title="Remover">×</button>
  </div>`).join('');
}

function addEvidence(){
  const d=document.getElementById('ev-date').value.trim();
  const t=document.getElementById('ev-text').value.trim();
  if(!t) return;
  if(!state.evidence) state.evidence=[];
  state.evidence.unshift({date:d||today(),text:t});
  document.getElementById('ev-date').value='';
  document.getElementById('ev-text').value='';
  save();
  renderEvidence();
}

function delEvidence(i){
  state.evidence.splice(i,1);
  save();
  renderEvidence();
}

function today(){
  const n=new Date();
  return n.getDate().toString().padStart(2,'0')+'/'+(n.getMonth()+1).toString().padStart(2,'0');
}

function showTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',['tarefas','kpis','evidencias'][i]===name)});
  ['tarefas','kpis','evidencias'].forEach(s=>document.getElementById('sec-'+s).classList.toggle('active',s===name));
}

function exportReport(){
  const lines=['# Relatório de Resultados — blockchain.pt','','## KPIs vs Objetivos',''];
  KPIS.forEach(k=>{
    const cur=state.kpis[k.id]||0;
    const pct=Math.round(cur/k.target*100);
    lines.push(`- ${k.label}: ${cur}${k.unit} / ${k.target}${k.unit} (${pct}%)`);
  });
  lines.push('','## Tarefas por Semana','');
  WEEKS.forEach(w=>{
    const done=w.tasks.filter((_,i)=>state.tasks[w.id+'_'+i]).length;
    lines.push(`### ${w.title} (${done}/${w.tasks.length})`);
    w.tasks.forEach((t,i)=>{
      lines.push(`- [${state.tasks[w.id+'_'+i]?'x':' '}] ${t}`);
    });
    lines.push('');
  });
  if(state.evidence&&state.evidence.length){
    lines.push('## Registo de Evidências','');
    state.evidence.forEach(e=>lines.push(`- **${e.date}** — ${e.text}`));
  }
  const text=lines.join('\n');
  sendPrompt('Aqui está o relatório de progresso do roadmap blockchain.pt:\n\n'+text+'\n\nPodes formatar isto num relatório executivo para apresentar ao supervisor?');
}

load();
</script>
