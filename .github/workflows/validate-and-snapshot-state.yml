name: Validate and Snapshot Dashboard State

on:
  push:
    paths:
      - "docs/data/state.json"
      - "docs/data/snapshots/**"
      - "scripts/validate-state.mjs"
      - "scripts/build-snapshot-index.mjs"
      - "docs/data/state.schema.json"
      - ".github/workflows/validate-and-snapshot-state.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: write

jobs:
  validate-and-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate dashboard state
        run: node scripts/validate-state.mjs

      - name: Create weekly snapshot
        run: |
          mkdir -p docs/data/snapshots
          snapshot_file="docs/data/snapshots/$(date -u +%F).json"
          cp docs/data/state.json "$snapshot_file"
          node scripts/build-snapshot-index.mjs

      - name: Commit snapshot if changed
        run: |
          if git diff --quiet -- docs/data/snapshots; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/snapshots
          git commit -m "chore: add dashboard state snapshot"
          git push
